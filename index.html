<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silva Lignum | Pure Artisan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');

        :root { --white: #ffffff; --black: #000000; --accent: #eeeeee; }
        
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--white); color: var(--black); font-weight: 300; overflow-x: hidden; }

        header { background: var(--white); padding: 1.2rem; text-align: center; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid var(--accent); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-style: italic; letter-spacing: 3px; margin-bottom: 10px; }
        
        .nav-links { display: flex; justify-content: center; gap: 30px; margin-bottom: 15px; }
        .nav-links a { text-decoration: none; color: var(--black); font-size: 0.65rem; letter-spacing: 2px; cursor: pointer; }

        .controls { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .ham { cursor: pointer; width: 18px; display: flex; flex-direction: column; gap: 5px; }
        .ham span { width: 100%; height: 1px; background: var(--black); }
        #search { border: none; border-bottom: 1px solid var(--accent); font-size: 0.6rem; padding: 5px; width: 100px; outline: none; }

        .sidebar { position: fixed; left: -100%; top: 0; width: 240px; height: 100%; background: var(--white); z-index: 1000; transition: 0.4s; padding-top: 80px; border-right: 1px solid var(--accent); }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 30px; color: var(--black); text-decoration: none; font-size: 0.65rem; letter-spacing: 2px; }

        .page { display: none; padding: 20px; animation: fadeIn 0.5s ease; min-height: 80vh; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { position: relative; cursor: pointer; }
        .card img { width: 100%; height: 200px; object-fit: cover; filter: grayscale(100%); transition: 0.4s; }
        .card:hover img { filter: grayscale(0%); }
        
        .tag { position: absolute; top: 10px; left: 10px; color: white; font-size: 0.5rem; padding: 3px 8px; letter-spacing: 1px; }
        .tag.low { background: var(--black); }
        .tag.sold { background: #999; }

        .info { padding: 12px 0; }
        .info h3 { font-size: 0.65rem; font-weight: 300; text-transform: uppercase; margin: 0; letter-spacing: 1px; }
        .price { font-size: 0.65rem; color: #888; margin-top: 4px; }

        /* Waitlist Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.95); z-index: 5000; display: none; align-items: center; justify-content: center; text-align: center; }
        .modal-content { padding: 40px; width: 80%; max-width: 400px; border: 1px solid var(--black); }
        .modal-content input { width: 100%; padding: 15px; margin: 20px 0; border: 1px solid #ccc; font-family: 'Montserrat'; outline: none; }

        .p-btn { background: none; border: 1px solid var(--black); padding: 10px 20px; font-size: 0.55rem; letter-spacing: 2px; cursor: pointer; margin: 40px 10px; }
        .back-btn { font-size: 0.6rem; letter-spacing: 2px; background: none; border: none; cursor: pointer; text-decoration: underline; margin-bottom: 30px; }
        .cart-bar { position: fixed; bottom: -60px; left: 0; width: 100%; background: var(--black); color: white; padding: 15px; text-align: center; font-size: 0.6rem; letter-spacing: 2px; transition: 0.4s; cursor: pointer; }
        .cart-bar.show { bottom: 0; }
    </style>
</head>
<body>

<header>
    <div class="logo">Silva Lignum</div>
    <div class="nav-links">
        <a onclick="showPage('home')">COLLECTION</a>
        <a onclick="showPage('about')">ABOUT</a>
    </div>
    <div class="controls">
        <div class="ham" onclick="toggleMenu()"><span></span><span></span></div>
        <input type="text" id="search" placeholder="SEARCH..." onkeyup="searchItems()">
    </div>
</header>

<div class="sidebar" id="sidebar">
    <a onclick="filter('Bedroom')">BEDROOMS</a>
    <a onclick="filter('Kitchen')">KITCHENS</a>
</div>

<div id="home" class="page active">
    <div class="grid" id="product-grid"></div>
    <div style="text-align:center;">
        <button class="p-btn" id="prev" onclick="changePage(-1)">PREVIOUS</button>
        <button class="p-btn" id="next" onclick="changePage(1)">NEXT</button>
    </div>
</div>

<div id="about" class="page">
    <button class="back-btn" onclick="showPage('home')">← BACK TO SHOP</button>
    <div style="text-align: center; padding: 40px 20px;">
        <h2 style="font-weight: 100; letter-spacing: 4px;">THE ARCHIVE</h2>
        <p style="font-size: 0.75rem; line-height: 2.5; color: #555;">Bespoke furniture curated for the modern minimalist.</p>
    </div>
</div>

<div id="waitlist-modal" class="modal">
    <div class="modal-content">
        <h3 id="wait-name" style="font-size:0.7rem; letter-spacing:2px;">ITEM NAME</h3>
        <p style="font-size:0.6rem; color:#666;">This piece is currently in production. Join the waitlist for priority access.</p>
        <input type="email" placeholder="YOUR EMAIL ADDRESS">
        <button onclick="closeWaitlist()" style="background:black; color:white; width:100%; padding:15px; border:none; font-size:0.6rem; letter-spacing:2px;">JOIN WAITLIST</button>
        <p onclick="closeWaitlist()" style="font-size:0.5rem; text-decoration:underline; margin-top:20px; cursor:pointer;">CLOSE</p>
    </div>
</div>

<div id="cart-bar" class="cart-bar" onclick="alert('Proceeding to Cart')">
    <span id="cart-count">0 ITEMS</span> | VIEW SELECTION
</div>

<script>
    const products = [
        { cat: 'Bedroom', name: 'Nara Low-Frame Bed', price: 310000, stock: 2, img: 'https://images.unsplash.com/photo-1505693419148-db19f38768e7?w=800' },
        { cat: 'Bedroom', name: 'Solis Side Table', price: 52000, stock: 5, img: 'https://images.unsplash.com/photo-1532323544230-7191fd51bc1b?w=800' },
        { cat: 'Bedroom', name: 'Kobe Oak Wardrobe', price: 445000, stock: 0, img: 'https://images.unsplash.com/photo-1595428774223-ef52624120d2?w=800' },
        { cat: 'Kitchen', name: 'Sura Marble Island', price: 620000, stock: 0, img: 'https://images.unsplash.com/photo-1556911220-e15b29be8c8f?w=800' },
        { cat: 'Kitchen', name: 'Hira Nordic Stool', price: 28000, stock: 8, img: 'https://images.unsplash.com/photo-1503602642458-232111445657?w=800' }
    ];

    let currentPage = 1, itemsPerPage = 10, filtered = [...products], cart = [];

    function render() {
        const start = (currentPage - 1) * itemsPerPage;
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        
        filtered.slice(start, start + itemsPerPage).forEach(p => {
            let status = p.stock === 0 ? '<div class="tag sold">WAITLIST</div>' : (p.stock < 3 ? `<div class="tag low">ONLY ${p.stock} LEFT</div>` : '');
            grid.innerHTML += `
                <div class="card" onclick="handleAction('${p.name}', ${p.stock})">
                    ${status}
                    <img src="${p.img}">
                    <div class="info"><h3>${p.name}</h3><div class="price">RS. ${p.price.toLocaleString()}</div></div>
                </div>`;
        });
        document.getElementById('prev').disabled = currentPage === 1;
        document.getElementById('next').disabled = start + itemsPerPage >= filtered.length;
    }

    function handleAction(name, stock) {
        if(stock === 0) {
            document.getElementById('wait-name').innerText = name.toUpperCase();
            document.getElementById('waitlist-modal').style.display = 'flex';
        } else {
            cart.push(products.find(x => x.name === name));
            document.getElementById('cart-count').innerText = `${cart.length} ITEMS`;
            document.getElementById('cart-bar').classList.add('show');
        }
    }

    function closeWaitlist() { document.getElementById('waitlist-modal').style.display = 'none'; }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); toggleMenu(false); }
    function toggleMenu(f) { const s = document.getElementById('sidebar'); if(f === false) s.classList.remove('active'); else s.classList.toggle('active'); }
    function filter(c) { filtered = products.filter(p => p.cat === c); currentPage = 1; render(); showPage('home'); }
    function changePage(d) { currentPage += d; render(); }
    function searchItems() { const q = document.getElementById('search').value.toLowerCase(); filtered = products.filter(p => p.name.toLowerCase().includes(q)); render(); }

    render();
</script>
</body>
</html>
