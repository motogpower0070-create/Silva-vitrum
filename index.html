<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Silva & Vitrum | Artisanal Glass & Wood Collection 2026</title>
  <meta name="description" content="Official Silva & Vitrum Shop. Hand-blown glass and hand-carved wood decor pieces. Collection 2026.">
  <meta name="keywords" content="Silva and Vitrum, glass decor, wood art, artisanal shop, luxury home 2026">

  <style>
    * { box-sizing: border-box; scroll-behavior: smooth; }
    body { background: #fdfdfd; color: #1a1a1a; font-family: "Georgia", serif; margin: 0; }
    nav { padding: 20px 5%; display: flex; justify-content: space-between; align-items: center; background: white; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #eee; }
    .logo { letter-spacing: 5px; font-weight: bold; font-size: 18px; cursor: pointer; }
    .nav-links span { font-size: 10px; letter-spacing: 2px; margin-left: 20px; cursor: pointer; text-transform: uppercase; color: #555; }
    .view-section { display: none; animation: fadeIn 0.4s ease; }
    .active { display: block; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .hero { height: 35vh; background: #f8f8f8; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    .filter-bar { text-align: center; padding: 25px 0; background: #fff; border-bottom: 1px solid #f9f9f9; }
    .f-btn { background: none; border: 1px solid #eee; padding: 8px 18px; font-size: 10px; border-radius: 20px; margin: 0 5px; cursor: pointer; }
    .f-btn.active { background: #1a1a1a; color: white; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 15px; max-width: 1000px; margin: 0 auto; }
    .card { border: 1px solid #f2f2f2; padding-bottom: 15px; text-align: center; background: white; cursor: pointer; }
    .img-box { height: 180px; background: #f4f4f4; display: flex; align-items: center; justify-content: center; color: #aaa; font-size: 10px; }
    .item-name { font-size: 14px; margin: 10px 0 5px 0; }
    .price { color: #8b5e3c; font-size: 12px; font-weight: bold; }
    .desc-content { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
    .add-cart-btn { background: #1a1a1a; color: white; border: none; padding: 20px; width: 100%; cursor: pointer; letter-spacing: 2px; text-transform: uppercase; }
    .checkout-box { max-width: 400px; margin: 60px auto; padding: 30px; border: 1px solid #eee; text-align: center; }
    .pay-btn { display: block; width: 100%; padding: 18px; margin-bottom: 10px; border: 1px solid #ddd; background: white; cursor: pointer; }
  </style>
</head>
<body>

<nav>
  <div class="logo" onclick="showView('home-view')">SILVA</div>
  <div class="nav-links">
    <span onclick="showView('home-view')">SHOP</span>
    <span onclick="showView('about-view')">ABOUT</span>
  </div>
</nav>

<div id="home-view" class="view-section active">
  <header class="hero"><h1>Silva & Vitrum</h1><p style="letter-spacing:4px; font-size:10px; color:#aaa;">ARTISAN COLLECTION</p></header>
  <div class="filter-bar">
    <button class="f-btn active" onclick="filterItems('ALL', this)">ALL</button>
    <button class="f-btn" onclick="filterItems('GLASS', this)">GLASS</button>
    <button class="f-btn" onclick="filterItems('WOOD', this)">WOOD</button>
  </div>
  <div class="grid" id="product-grid"></div>
</div>

<div id="desc-view" class="view-section">
  <div class="desc-content">
    <div style="width:100%; height:300px; background:#f4f4f4; margin-bottom:30px;"></div>
    <h1 id="d-title" style="font-style:italic;"></h1>
    <p id="d-price" style="font-weight:bold; color:#8b5e3c;"></p>
    <p id="d-text" style="line-height:1.8; color:#444;"></p>
    <button class="add-cart-btn" onclick="showView('checkout-view')">ADD TO CART</button>
    <p onclick="showView('home-view')" style="text-align:center; margin-top:30px; font-size:11px; text-decoration:underline; cursor:pointer;">← BACK</p>
  </div>
</div>

<div id="checkout-view" class="view-section">
  <div class="checkout-box">
    <h2 style="font-style:italic;">Checkout</h2>
    <button class="pay-btn" onclick="alert('Card Selected')">CREDIT CARD</button>
    <button class="pay-btn" onclick="alert('Apple Pay Selected')">APPLE PAY</button>
    <button class="pay-btn" onclick="alert('Crypto Selected')">BITCOIN / ETH</button>
    <p onclick="showView('home-view')" style="margin-top:30px; font-size:11px; text-decoration:underline; cursor:pointer;">Cancel</p>
  </div>
</div>

<div id="about-view" class="view-section">
  <div style="padding: 80px 10%; text-align: center;">
    <h2 style="font-style:italic;">Our Vision</h2>
    <p>Combining earth-grown wood and hand-blown glass for the modern home.</p>
    <button class="add-cart-btn" style="width:auto; padding: 15px 40px;" onclick="showView('home-view')">Back to Shop</button>
  </div>
</div>

<script>
  const products = [
    { name: "Aurora Vase", type: "GLASS", price: "$180", desc: "Hand-blown smoke glass. Melted at 2400°F and swirled by hand." },
    { name: "Heritage Bowl", type: "WOOD", price: "$240", desc: "Carved from a single block of Black Walnut and sealed with organic beeswax." },
    { name: "Lumina Carafe", type: "GLASS", price: "$120", desc: "Precision fluted crystal designed to refract light." },
    { name: "Sculpt Tray", type: "WOOD", price: "$95", desc: "White Oak tray with sand-finished edges for a satin-soft touch." },
    { name: "Solis Sphere", type: "GLASS", price: "$210", desc: "Amber glass center-piece designed to hold botanicals." },
    { name: "Apex Platter", type: "WOOD", price: "$135", desc: "Reclaimed Teak wood platter with a natural finish." },
    { name: "Nordic Pitcher", type: "GLASS", price: "$110", desc: "Thick recycled glass featuring artisanal bubbles." },
    { name: "Pillar Stand", type: "WOOD", price: "$80", desc: "Ebonized Ash wood stand charred to highlight grain." },
    { name: "Prism Vessel", type: "GLASS", price: "$290", desc: "Geometric crystal hand-ground to cast prisms." },
    { name: "Basin Board", type: "WOOD", price: "$155", desc: "Solid Acacia wood with a hand-routed basin." }
  ];

  function renderGrid(filter = 'ALL') {
    const grid = document.getElementById('product-grid');
    grid.innerHTML = '';
    products.filter(p => filter === 'ALL' || p.type === filter).forEach(p => {
      grid.innerHTML += `
        <div class="card" onclick="openDesc('${p.name}', '${p.price}', '${p.desc}')">
          <div class="img-box">${p.type}</div>
          <div class="item-name">${p.name}</div>
          <div class="price">${p.price}</div>
        </div>`;
    });
  }

  function filterItems(type, btn) {
    document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(type);
  }

  function showView(viewId) {
    document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
    document.getElementById(viewId).classList.add('active');
    window.scrollTo(0,0);
  }

  function openDesc(name, price, text) {
    document.getElementById('d-title').innerText = name;
    document.getElementById('d-price').innerText = price;
    document.getElementById('d-text').innerText = text;
    showView('desc-view');
  }

  renderGrid();
</script>
</body>
</html>
