<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silva Lignum | Artisan Woodwork Pakistan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root { --white: #ffffff; --black: #1a1a1a; --accent: #f4f4f4; --gold: #ae944f; --pkr-green: #006633; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--white); color: var(--black); line-height: 1.6; }

        /* Fixed Cart Header */
        .cart-status-bar { background: var(--black); color: white; padding: 10px; text-align: center; position: sticky; top: 0; z-index: 1100; font-size: 0.7rem; letter-spacing: 1px; }
        
        header { background: white; padding: 1rem; text-align: center; border-bottom: 1px solid var(--accent); }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; letter-spacing: 3px; cursor: pointer; }
        
        .ham { cursor: pointer; position: absolute; left: 20px; top: 55px; width: 25px; }
        .ham span { display: block; height: 2px; background: black; margin-bottom: 5px; }

        .sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.4s; border-right: 1px solid #eee; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; text-decoration: none; color: black; font-size: 0.8rem; cursor: pointer; border-bottom: 1px solid #f9f9f9; }

        /* Grid */
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .product-card { text-align: center; margin-bottom: 20px; }
        .product-card img { width: 100%; height: 180px; object-fit: cover; border-radius: 4px; cursor: pointer; background: #eee; }
        
        /* Star Rating */
        .stars { color: var(--gold); font-size: 0.8rem; margin: 5px 0; }
        .star-input { font-size: 1.5rem; cursor: pointer; color: #ccc; }
        .star-input.selected { color: var(--gold); }

        /* Buttons */
        .btn-main { background: var(--black); color: white; border: none; padding: 15px; width: 100%; font-size: 0.7rem; font-weight: 600; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        .btn-alt { background: white; color: var(--black); border: 1px solid var(--black); padding: 15px; width: 100%; font-size: 0.7rem; font-weight: 600; cursor: pointer; margin-top: 10px; }

        /* Review Section */
        .review-box { margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        .review-item { font-size: 0.75rem; background: #f9f9f9; padding: 10px; margin-bottom: 10px; border-radius: 4px; }

        input, select, textarea { width: 100%; padding: 12px; margin-top: 8px; border: 1px solid #ddd; font-family: 'Montserrat'; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="cart-status-bar" id="cart-status">
    CART: 0 ITEMS | TOTAL: RS. 0
</div>

<header>
    <div class="ham" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="logo" onclick="showPage('home')">Silva Lignum</div>
</header>

<div class="sidebar" id="sidebar">
    <a onclick="filter('All')">ALL PRODUCTS</a>
    <a onclick="filter('Bedroom')">BEDROOM (5)</a>
    <a onclick="filter('Kitchen')">KITCHEN (5)</a>
    <a onclick="filter('Seasonal')">SEASONAL (5)</a>
    <a onclick="filter('Discounted')">DISCOUNTED (5)</a>
    <a onclick="filter('Deals')">DEALS (5)</a>
</div>

<div id="home" class="page active">
    <div class="grid" id="main-grid"></div>
</div>

<div id="product-page" class="page">
    <button class="btn-alt" style="width:auto; margin-bottom:20px;" onclick="showPage('home')">← BACK</button>
    <div id="product-detail-content"></div>
</div>

<div id="add-more-page" class="page">
    <h3 style="text-align:center;">PEOPLE ALSO BOUGHT</h3>
    <div class="grid" id="upsell-grid"></div>
    <button class="btn-main" onclick="showPage('checkout')">PROCEED TO BUY NOW</button>
</div>

<div id="checkout" class="page">
    <h2 style="text-align:center;">FINAL CHECKOUT</h2>
    <div id="final-summary" style="padding:15px; background:#f4f4f4; margin-bottom:20px; font-size:0.8rem;"></div>
    <input type="text" placeholder="FULL NAME">
    <input type="text" placeholder="PAKISTAN MOBILE NO (+92)">
    <input type="email" placeholder="EMAIL ADDRESS">
    <select><option>Select City (Lahore, Karachi, etc)</option><option>Lahore</option><option>Karachi</option><option>Islamabad</option></select>
    <select><option>Cash on Delivery</option><option>Bank Transfer</option></select>
    <button class="btn-main" onclick="alert('Order Placed Successfully!')">PLACE ORDER</button>
</div>

<script>
    let cart = [];
    let products = [];
    const categories = ['Bedroom', 'Kitchen', 'Seasonal', 'Discounted', 'Deals'];
    const names = {
        'Bedroom': ['Ziarat Bed', 'Indus Side', 'Kaghan Robe', 'Hunza Dress', 'Swat Chair'],
        'Kitchen': ['Poto Table', 'Marg Stool', 'Bolan Cab', 'Salt Rack', 'Chen Island'],
        'Seasonal': ['Mur Mantle', 'Nar Bench', 'Kal Set', 'Ayu Chair', 'Ska Trunk'],
        'Discounted': ['Lah Desk', 'Ravi Table', 'Tax Console', 'Sufi Bench', 'Khy Shelf'],
        'Deals': ['Meh Mirror', 'Sial Rack', 'Mul Stand', 'Que Chest', 'Gwa Table']
    };

    // Initialize 25 Products with specific IDs for furniture images
    categories.forEach(cat => {
        names[cat].forEach((name, i) => {
            products.push({
                id: `${cat}-${i}`,
                category: cat,
                name: name,
                price: 35000 + (i * 5000),
                stock: 3,
                // Using reliable Source.Unsplash IDs for furniture
                img: `https://loremflickr.com/600/600/furniture,wood?random=${cat}${i}`,
                desc: `Premium ${name} handcrafted with seasoned wood. Built for durability and minimalist elegance. Guaranteed 10-year timber warranty for Pakistan.`,
                reviews: [{user: "Ahmed", stars: 5, text: "Excellent quality timber!"}]
            });
        });
    });

    function render(list, target) {
        const grid = document.getElementById(target);
        grid.innerHTML = list.map(p => `
            <div class="product-card">
                <img src="${p.img}" onclick="viewProduct('${p.id}')">
                <div class="product-name">${p.name}</div>
                <div class="product-price">Rs. ${p.price.toLocaleString()}</div>
            </div>
        `).join('');
    }

    function viewProduct(id) {
        const p = products.find(x => x.id === id);
        const detail = document.getElementById('product-detail-content');
        detail.innerHTML = `
            <img src="${p.img}" style="width:100%; border-radius:8px;">
            <h2>${p.name}</h2>
            <div class="stars">★★★★★ (15 Reviews)</div>
            <p>${p.desc}</p>
            <div style="display:flex; gap:10px;">
                <button class="btn-main" onclick="addToCart('${p.id}')">ADD TO CART</button>
                <button class="btn-alt" onclick="showUpsell()">ADD MORE</button>
            </div>
            
            <div class="review-box">
                <h4>CUSTOMER REVIEWS</h4>
                <div id="review-list-${p.id}">
                    ${p.reviews.map(r => `<div class="review-item"><strong>${r.user}</strong>: ${'★'.repeat(r.stars)}<br>${r.text}</div>`).join('')}
                </div>
                <h5>LEAVE A REVIEW</h5>
                <div id="star-rating-input">
                    <span class="star-input" onclick="setStar(1)">★</span><span class="star-input" onclick="setStar(2)">★</span><span class="star-input" onclick="setStar(3)">★</span><span class="star-input" onclick="setStar(4)">★</span><span class="star-input" onclick="setStar(5)">★</span>
                </div>
                <textarea id="rev-text" placeholder="Share your experience..."></textarea>
                <button class="btn-alt" onclick="postReview('${p.id}')">POST REVIEW</button>
            </div>
        `;
        showPage('product-page');
    }

    let selectedStars = 0;
    function setStar(n) {
        selectedStars = n;
        const stars = document.querySelectorAll('.star-input');
        stars.forEach((s, i) => s.classList.toggle('selected', i < n));
    }

    function postReview(id) {
        const text = document.getElementById('rev-text').value;
        if(!selectedStars) return alert("Select stars!");
        const p = products.find(x => x.id === id);
        p.reviews.push({user: "Guest User", stars: selectedStars, text: text});
        viewProduct(id);
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        cart.push(p);
        updateCartHeader();
    }

    function updateCartHeader() {
        const total = cart.reduce((sum, p) => sum + p.price, 0);
        document.getElementById('cart-status').innerText = `CART: ${cart.length} ITEMS | TOTAL: RS. ${total.toLocaleString()}`;
    }

    function showUpsell() {
        const randoms = products.sort(() => 0.5 - Math.random()).slice(0, 4);
        render(randoms, 'upsell-grid');
        showPage('add-more-page');
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('sidebar').classList.remove('active');
        if(id === 'checkout') {
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('final-summary').innerText = `Items: ${cart.length} | Grand Total: Rs. ${total.toLocaleString()}`;
        }
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    function filter(c) { render(c==='All'?products:products.filter(p=>p.category===c), 'main-grid'); showPage('home'); }

    render(products, 'main-grid');
</script>

</body>
</html>
