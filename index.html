<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silva Lignum | Artisan Woodwork Pakistan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root { --white: #ffffff; --black: #1a1a1a; --accent: #f4f4f4; --pkr-green: #006633; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--white); color: var(--black); line-height: 1.6; }

        /* Header & Search */
        header { background: white; padding: 1.5rem 1rem; text-align: center; border-bottom: 1px solid var(--accent); sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2rem; letter-spacing: 3px; margin-bottom: 15px; cursor: pointer; }
        #search { width: 90%; max-width: 500px; padding: 12px; border: 1px solid #ddd; outline: none; font-family: 'Montserrat'; text-align: center; }

        /* Menu */
        .ham { cursor: pointer; position: absolute; left: 20px; top: 35px; width: 25px; }
        .ham span { display: block; height: 2px; background: black; margin-bottom: 5px; }
        .sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.4s; border-right: 1px solid #eee; padding-top: 60px; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; text-decoration: none; color: black; font-size: 0.8rem; letter-spacing: 1px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }

        /* Grid System */
        .page { display: none; padding: 20px; animation: fadeIn 0.5s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .product-card { text-align: center; margin-bottom: 25px; }
        .product-card img { width: 100%; height: 200px; object-fit: cover; border-radius: 4px; cursor: pointer; transition: 0.3s; }
        .product-card img:hover { opacity: 0.8; }
        .product-name { font-size: 0.75rem; font-weight: 600; margin: 10px 0 5px; text-transform: uppercase; }
        .product-price { font-size: 0.8rem; color: #555; }

        /* Detail Page */
        .detail-img { width: 100%; max-height: 400px; object-fit: cover; border-radius: 8px; }
        .description { font-size: 0.9rem; margin: 20px 0; color: #444; border-left: 3px solid var(--black); padding-left: 15px; }
        .btn-container { display: flex; gap: 10px; margin-top: 20px; }

        /* Buttons */
        .btn-main { background: var(--black); color: white; border: none; padding: 15px 20px; font-size: 0.7rem; font-weight: 600; cursor: pointer; flex: 1; text-transform: uppercase; letter-spacing: 1px; }
        .btn-alt { background: white; color: var(--black); border: 1px solid var(--black); padding: 15px 20px; font-size: 0.7rem; font-weight: 600; cursor: pointer; flex: 1; text-transform: uppercase; }

        /* Checkout Form */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 0.7rem; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 12px; border: 1px solid #ddd; font-family: 'Montserrat'; box-sizing: border-box; }

        .stock-label { font-size: 0.65rem; color: var(--pkr-green); font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>

<header>
    <div class="ham" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="logo" onclick="showPage('home')">Silva Lignum</div>
    <input type="text" id="search" placeholder="Search furniture in Pakistan..." onkeyup="searchItems()">
</header>

<div class="sidebar" id="sidebar">
    <a onclick="filter('All')">ALL PRODUCTS</a>
    <a onclick="filter('Bedroom')">BEDROOM</a>
    <a onclick="filter('Kitchen')">KITCHEN</a>
    <a onclick="filter('Seasonal')">SEASONAL ITEMS</a>
    <a onclick="filter('Discounted')">DISCOUNTED</a>
    <a onclick="filter('Deals')">EXCLUSIVE DEALS</a>
    <a onclick="toggleWholesale()">WHOLESALE BULK</a>
</div>

<div id="home" class="page active">
    <div class="grid" id="main-grid"></div>
</div>

<div id="product-page" class="page">
    <button class="btn-alt" style="margin-bottom:20px; width:auto;" onclick="showPage('home')">← BACK</button>
    <div id="product-detail-content"></div>
</div>

<div id="add-more-page" class="page">
    <h2 style="text-align:center; font-family:'Playfair Display';">Complete Your Set</h2>
    <p style="text-align:center; font-size:0.8rem; margin-bottom:30px;">Customers usually pair their choice with these items:</p>
    <div class="grid" id="upsell-grid"></div>
    <button class="btn-main" style="width:100%; margin-top:40px; padding:25px;" onclick="showPage('checkout')">BUY ALL NOW</button>
</div>

<div id="checkout" class="page">
    <h2 style="text-align:center; font-family:'Playfair Display';">Order Details (Pakistan Only)</h2>
    <div class="form-group">
        <label>FULL NAME</label>
        <input type="text" placeholder="Enter your name">
    </div>
    <div class="form-group">
        <label>WHATSAPP / MOBILE NO</label>
        <input type="text" placeholder="+92 3XX XXXXXXX">
    </div>
    <div class="form-group">
        <label>EMAIL ADDRESS</label>
        <input type="email" placeholder="email@example.pk">
    </div>
    <div class="form-group">
        <label>SHIPPING LOCATION (CITY)</label>
        <select>
            <option>Lahore</option>
            <option>Karachi</option>
            <option>Islamabad</option>
            <option>Faisalabad</option>
            <option>Peshawar</option>
            <option>Other</option>
        </select>
    </div>
    <div class="form-group">
        <label>PAYMENT METHOD</label>
        <select>
            <option>Cash on Delivery</option>
            <option>Bank Transfer (JazzCash/EasyPaisa)</option>
        </select>
    </div>
    <button class="btn-main" style="width:100%;" onclick="alert('Order Successful! We will contact you on your provided number.')">CONFIRM PAKISTAN ORDER</button>
</div>

<script>
    const categories = ['Bedroom', 'Kitchen', 'Seasonal', 'Discounted', 'Deals'];
    const names = {
        'Bedroom': ['Ziarat Oak Bed', 'Indus Nightstand', 'Kaghan Wardrobe', 'Hunza Dresser', 'Swat Lounge Chair'],
        'Kitchen': ['Potohar Dining Table', 'Margalla Stool', 'Bolan Cabinet', 'Salt Range Rack', 'Chenab Kitchen Island'],
        'Seasonal': ['Murree Fireplace Mantle', 'Naran Garden Bench', 'Kalash Patio Set', 'Ayubia Rocking Chair', 'Skardu Trunk'],
        'Discounted': ['Lahore Heritage Desk', 'Ravi Side Table', 'Taxila Console', 'Sufi Prayer Bench', 'Khyber Bookshelf'],
        'Deals': ['Mehran Mirror Set', 'Sialkot Shoe Rack', 'Multan Pottery Stand', 'Quetta Rug Chest', 'Gwadar Coffee Table']
    };

    let products = [];
    categories.forEach(cat => {
        names[cat].forEach((name, i) => {
            products.push({
                id: `${cat}-${i}`,
                category: cat,
                name: name,
                price: Math.floor(Math.random() * 150000) + 25000,
                stock: Math.floor(Math.random() * 5) + 1,
                img: `https://images.unsplash.com/photo-${1550000000000 + (Math.random()*100000).toFixed(0)}?auto=format&fit=crop&w=800&q=80`,
                desc: `This ${name} is handcrafted in Pakistan using premium solid wood. It features a water-resistant finish and a minimalist artisan design. Perfect for modern Pakistani homes looking for heritage quality.`
            });
        });
    });

    function render(list, targetId) {
        const grid = document.getElementById(targetId);
        grid.innerHTML = '';
        list.forEach(p => {
            grid.innerHTML += `
                <div class="product-card">
                    <img src="${p.img}" onclick="viewProduct('${p.id}')">
                    <div class="stock-label">STOCK = ${p.stock}</div>
                    <div class="product-name">${p.name}</div>
                    <div class="product-price">Rs. ${p.price.toLocaleString()}</div>
                </div>`;
        });
    }

    function viewProduct(id) {
        const p = products.find(x => x.id === id);
        const content = document.getElementById('product-detail-content');
        content.innerHTML = `
            <img src="${p.img}" class="detail-img">
            <h1 style="font-family:'Playfair Display';">${p.name}</h1>
            <div class="stock-label" style="font-size:1rem;">Stock Status: ${p.stock > 0 ? p.stock : 'Out of Stock'}</div>
            <div class="product-price" style="font-size:1.2rem; margin:10px 0;">Rs. ${p.price.toLocaleString()}</div>
            <p class="description">${p.desc}</p>
            <div class="btn-container">
                <button class="btn-main" onclick="alert('Added to Cart!')">ADD TO CART</button>
                <button class="btn-alt" onclick="showUpsell()">ADD MORE</button>
            </div>
        `;
        showPage('product-page');
    }

    function showUpsell() {
        const upsellItems = products.sort(() => 0.5 - Math.random()).slice(0, 4);
        render(upsellItems, 'upsell-grid');
        showPage('add-more-page');
    }

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('sidebar').classList.remove('active');
        window.scrollTo(0,0);
    }

    function filter(cat) {
        const filtered = cat === 'All' ? products : products.filter(p => p.category === cat);
        render(filtered, 'main-grid');
        showPage('home');
    }

    function searchItems() {
        const q = document.getElementById('search').value.toLowerCase();
        const filtered = products.filter(p => p.name.toLowerCase().includes(q));
        render(filtered, 'main-grid');
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

    // Initial load
    render(products, 'main-grid');
</script>

</body>
</html>
