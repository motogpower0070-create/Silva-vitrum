<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silva Lignum | Artisan Suite</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400&family=Playfair+Display:ital,wght@0,400;1,400&display=swap');

        :root { --white: #ffffff; --black: #000000; --accent: #f2f2f2; --red: #bc0000; --gold: #ae944f; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--white); color: var(--black); font-weight: 300; overflow-x: hidden; }

        /* Navigation & Header */
        header { background: var(--white); padding: 1rem; text-align: center; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--accent); }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; font-style: italic; letter-spacing: 4px; margin-bottom: 5px; cursor: pointer; }
        .header-tools { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 10px; }
        .currency-select { border: none; font-family: 'Montserrat'; font-size: 0.6rem; letter-spacing: 2px; cursor: pointer; background: none; outline: none; }
        #search { width: 90%; max-width: 400px; padding: 10px; border: 1px solid var(--accent); font-family: 'Montserrat'; font-size: 0.7rem; outline: none; text-align: center; }

        .ham { cursor: pointer; position: absolute; left: 20px; top: 25px; width: 22px; z-index: 2100; }
        .ham span { display: block; height: 1px; background: black; margin-bottom: 6px; }

        .sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.4s; padding-top: 80px; border-right: 1px solid var(--accent); overflow-y: auto; }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 16px 30px; color: black; text-decoration: none; font-size: 0.65rem; letter-spacing: 2px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }

        /* Pages & Grid */
        .page { display: none; padding: 20px; min-height: 80vh; animation: fadeIn 0.4s; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { text-align: center; margin-bottom: 30px; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; cursor: pointer; border-radius: 2px; }
        
        /* Buttons & Qty */
        .buy-btn { background: black; color: white; border: none; padding: 12px; font-size: 0.6rem; letter-spacing: 1px; cursor: pointer; width: 100%; text-transform: uppercase; }
        .qty-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }
        .q-btn { border: 1px solid #ddd; background: white; width: 28px; height: 28px; cursor: pointer; }

        /* Chat Support */
        .chat-bubble { position: fixed; bottom: 30px; right: 30px; width: 50px; height: 50px; background: black; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 4000; font-size: 1.2rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .chat-window { position: fixed; bottom: 90px; right: 30px; width: 300px; height: 400px; background: white; border: 1px solid #eee; display: none; flex-direction: column; z-index: 4000; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-radius: 8px; }
        .chat-header { background: #fafafa; padding: 15px; font-size: 0.65rem; letter-spacing: 1px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; font-size: 0.7rem; }
        .chat-input { display: flex; border-top: 1px solid #eee; }
        .chat-input input { border: none; padding: 15px; flex: 1; font-family: 'Montserrat'; font-size: 0.7rem; outline: none; }
        .chat-input button { border: none; background: black; color: white; padding: 0 15px; cursor: pointer; font-size: 0.6rem; }
        
        .msg { margin-bottom: 10px; padding: 8px 12px; border-radius: 5px; max-width: 80%; }
        .bot { background: #f0f0f0; align-self: flex-start; }
        .user { background: #000; color: #fff; align-self: flex-end; margin-left: auto; }

        /* Popups */
        .cart-bar { position: fixed; bottom: -100px; left: 0; width: 100%; background: white; border-top: 1px solid black; padding: 20px; display: flex; justify-content: space-around; align-items: center; transition: 0.4s; z-index: 3000; }
        .cart-bar.active { bottom: 0; }
    </style>
</head>
<body>

<header>
    <div class="ham" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="logo" onclick="showPage('home')">Silva Lignum</div>
    <div class="header-tools">
        <select class="currency-select" id="currency" onchange="updateCurrency()">
            <option value="PKR">PKR (₨)</option>
            <option value="USD">USD ($)</option>
            <option value="AED">AED (د.إ)</option>
        </select>
        <input type="text" id="search" placeholder="SEARCH COLLECTION..." onkeyup="searchItems()">
    </div>
</header>

<div class="sidebar" id="sidebar">
    <a onclick="filter('All')">ALL PRODUCTS</a>
    <a onclick="showPage('dashboard')">DASHBOARD</a>
    <a onclick="filter('Bedroom')">BEDROOM</a>
    <a onclick="filter('Kitchen')">KITCHEN</a>
    <a onclick="toggleWholesale()" id="ws-btn">WHOLESALE (OFF)</a>
</div>

<div id="home" class="page active"><div class="grid" id="main-grid"></div></div>
<div id="dashboard" class="page"><h3 style="letter-spacing:2px;">ORDER HISTORY</h3><div id="order-history-list">No orders found.</div></div>
<div id="product-page" class="page"><div id="detail-box"></div></div>
<div id="checkout" class="page">
    <h3 style="text-align:center;">CHECKOUT</h3>
    <button class="buy-btn" onclick="placeOrder()">PLACE ORDER</button>
</div>

<div class="chat-bubble" onclick="toggleChat()">💬</div>
<div class="chat-window" id="chat-window">
    <div class="chat-header"><span>ARTISAN SUPPORT</span><span onclick="toggleChat()" style="cursor:pointer">✕</span></div>
    <div class="chat-messages" id="chat-msgs">
        <div class="msg bot">Hello! How can I assist you with our woodwork today?</div>
    </div>
    <div class="chat-input">
        <input type="text" id="chat-in" placeholder="Type a message...">
        <button onclick="sendMsg()">SEND</button>
    </div>
</div>

<div id="cart-bar" class="cart-bar">
    <div id="cart-info" style="font-size: 0.65rem;">0 ITEMS</div>
    <button class="buy-btn" style="width:auto; padding:10px 20px;" onclick="showPage('checkout')">BUY NOW</button>
</div>

<script>
    const rates = { PKR: 1, USD: 0.0036, AED: 0.013 };
    const symbols = { PKR: '₨', USD: '$', AED: 'د.إ' };
    let currentCurrency = 'PKR', isWholesale = false, products = [], cart = {}, orders = [];

    // Gen Data
    ['Bedroom', 'Kitchen'].forEach(c => {
        for(let i=1; i<=5; i++) {
            products.push({ id: `${c}-${i}`, category: c, name: `${c} Item ${i}`, price: 45000, stock: 5, img: `https://picsum.photos/500/500?random=${c}${i}` });
        }
    });

    function render() {
        const grid = document.getElementById('main-grid');
        grid.innerHTML = products.map(p => `
            <div class="card">
                <img src="${p.img}" onclick="viewProduct('${p.id}')">
                <div style="font-size:0.5rem; color:red;">STOCK: ${p.stock}</div>
                <h3>${p.name}</h3>
                <div class="price">${symbols[currentCurrency]} ${(p.price * rates[currentCurrency] * (isWholesale ? 0.7 : 1)).toLocaleString()}</div>
                <div class="qty-row">
                    <button class="q-btn" onclick="adjQty('${p.id}', -1)">-</button>
                    <span>${cart[p.id] || 0}</span>
                    <button class="q-btn" onclick="adjQty('${p.id}', 1)">+</button>
                </div>
                <button class="buy-btn" onclick="addCart()">ADD TO CART</button>
            </div>
        `).join('');
    }

    function toggleChat() { 
        const win = document.getElementById('chat-window');
        win.style.display = win.style.display === 'flex' ? 'none' : 'flex'; 
    }

    function sendMsg() {
        const input = document.getElementById('chat-in');
        if(!input.value) return;
        const msgs = document.getElementById('chat-msgs');
        msgs.innerHTML += `<div class="msg user">${input.value}</div>`;
        input.value = '';
        setTimeout(() => {
            msgs.innerHTML += `<div class="msg bot">An artisan will be with you shortly. Thank you for your patience.</div>`;
            msgs.scrollTop = msgs.scrollHeight;
        }, 1000);
    }

    function adjQty(id, d) { cart[id] = Math.max(0, (cart[id] || 0) + d); render(); }
    function addCart() { document.getElementById('cart-bar').classList.add('active'); }
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('cart-bar').classList.remove('active');
        window.scrollTo(0,0);
    }

    function toggleWholesale() { isWholesale = !isWholesale; render(); }
    function updateCurrency() { currentCurrency = document.getElementById('currency').value; render(); }
    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

    render();
</script>
</body>
</html>
