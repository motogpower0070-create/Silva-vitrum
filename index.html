<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silva-Vitrum | Premium Wood & Glass Pakistan</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root { --white: #ffffff; --black: #1a1a1a; --accent: #f4f4f4; --gold: #ae944f; --pkr-green: #006633; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--white); color: var(--black); line-height: 1.6; }

        /* Navigation & Status */
        .cart-status-bar { background: var(--black); color: white; padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1100; font-size: 0.75rem; letter-spacing: 1px; font-weight: 600; border-bottom: 1px solid #333; }
        
        header { background: white; padding: 1rem; text-align: center; border-bottom: 1px solid var(--accent); position: relative; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; letter-spacing: 3px; cursor: pointer; color: var(--black); }
        
        .ham { cursor: pointer; position: absolute; left: 20px; top: 25px; width: 25px; }
        .ham span { display: block; height: 2px; background: black; margin-bottom: 5px; }

        .sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.4s; border-right: 1px solid #eee; padding-top: 60px; box-shadow: 10px 0 30px rgba(0,0,0,0.05); }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 18px 25px; text-decoration: none; color: black; font-size: 0.8rem; font-weight: 400; border-bottom: 1px solid #f9f9f9; cursor: pointer; }

        /* Layout & Pages */
        .page { display: none; padding: 20px; animation: fadeIn 0.4s; max-width: 800px; margin: auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .product-card { text-align: center; margin-bottom: 25px; border: 1px solid transparent; transition: 0.3s; padding: 10px; }
        .product-card:hover { border-color: #eee; }
        .product-card img { width: 100%; height: 220px; object-fit: cover; border-radius: 4px; cursor: pointer; background: #f0f0f0; }
        
        /* Typography */
        .product-name { font-size: 0.8rem; font-weight: 600; margin: 12px 0 5px; text-transform: uppercase; color: #333; }
        .product-price { font-size: 0.85rem; color: var(--pkr-green); font-weight: 600; }

        /* Buttons & Controls */
        .btn-main { background: var(--black); color: white; border: none; padding: 16px; width: 100%; font-size: 0.75rem; font-weight: 600; cursor: pointer; text-transform: uppercase; margin-top: 10px; letter-spacing: 1px; }
        .btn-alt { background: white; color: var(--black); border: 1px solid var(--black); padding: 14px; width: 100%; font-size: 0.75rem; font-weight: 600; cursor: pointer; margin-top: 10px; text-transform: uppercase; }
        .back-btn { background: #f4f4f4; color: #666; border: none; padding: 10px 20px; font-size: 0.65rem; cursor: pointer; margin-bottom: 20px; display: inline-flex; align-items: center; border-radius: 20px; font-weight: 600; }

        /* Review Section */
        .stars { color: var(--gold); font-size: 0.9rem; margin: 8px 0; }
        .star-input { font-size: 1.8rem; cursor: pointer; color: #ddd; padding: 0 5px; }
        .star-input.selected { color: var(--gold); }
        .review-box { margin-top: 40px; background: #fafafa; padding: 20px; border-radius: 8px; }
        .review-item { padding: 15px; border-bottom: 1px solid #eee; font-size: 0.8rem; }

        input, select, textarea { width: 100%; padding: 14px; margin-top: 10px; border: 1px solid #ddd; font-family: 'Montserrat'; font-size: 0.8rem; box-sizing: border-box; border-radius: 4px; }
        .section-title { font-family: 'Playfair Display'; text-align: center; font-size: 1.6rem; margin-bottom: 30px; }
    </style>
</head>
<body>

<div class="cart-status-bar" id="cart-status">
    CART: 0 ITEMS | RS. 0
</div>

<header>
    <div class="ham" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="logo" onclick="showPage('home')">Silva-Vitrum</div>
</header>

<div class="sidebar" id="sidebar">
    <a onclick="filter('All')">ALL COLLECTIONS</a>
    <a onclick="filter('Bedroom')">BEDROOM SUITES</a>
    <a onclick="filter('Kitchen')">KITCHEN & DINING</a>
    <a onclick="filter('Seasonal')">SEASONAL EDITIONS</a>
    <a onclick="filter('Discounted')">DISCOUNTED PIECES</a>
    <a onclick="filter('Deals')">EXCLUSIVE OFFERS</a>
    <a onclick="showPage('home')">BACK TO SHOP</a>
</div>

<div id="home" class="page active">
    <h2 class="section-title">Silva-Vitrum Pakistan</h2>
    <div class="grid" id="main-grid"></div>
</div>

<div id="product-page" class="page">
    <button class="back-btn" onclick="showPage('home')">← BACK TO SHOP</button>
    <div id="product-detail-content"></div>
</div>

<div id="add-more-page" class="page">
    <button class="back-btn" onclick="showPage('home')">← BACK TO SHOP</button>
    <h3 class="section-title">Complementary Pieces</h3>
    <div class="grid" id="upsell-grid"></div>
    <button class="btn-main" style="padding:25px; font-size:1rem;" onclick="showPage('checkout')">PROCEED TO BUY NOW</button>
</div>

<div id="checkout" class="page">
    <button class="back-btn" onclick="showPage('home')">← BACK TO SHOP</button>
    <h2 class="section-title">Silva-Vitrum Checkout</h2>
    <div id="final-summary" style="padding:20px; background:#f9f9f9; border:1px dashed #ccc; margin-bottom:25px; text-align:center; font-weight:600;"></div>
    
    <div style="background:white; padding:10px;">
        <label style="font-size:0.7rem; font-weight:600;">FULL NAME</label>
        <input type="text" placeholder="Enter Full Name">
        
        <label style="font-size:0.7rem; font-weight:600; margin-top:15px; display:block;">MOBILE NO</label>
        <input type="text" placeholder="+92 3XX XXXXXXX">
        
        <label style="font-size:0.7rem; font-weight:600; margin-top:15px; display:block;">EMAIL</label>
        <input type="email" placeholder="customer@email.com">
        
        <label style="font-size:0.7rem; font-weight:600; margin-top:15px; display:block;">SHIPPING CITY</label>
        <select><option>Select City</option><option>Lahore</option><option>Karachi</option><option>Islamabad</option><option>Faisalabad</option><option>Rawalpindi</option><option>Other</option></select>
        
        <label style="font-size:0.7rem; font-weight:600; margin-top:15px; display:block;">PAYMENT METHOD</label>
        <select><option>Cash on Delivery</option><option>Direct Bank Transfer</option><option>JazzCash / EasyPaisa</option></select>
        
        <button class="btn-main" style="margin-top:30px;" onclick="alert('Success! Your Silva-Vitrum order has been received. We will call you to confirm.')">PLACE ORDER</button>
    </div>
</div>

<script>
    let cart = [];
    let products = [];
    const categories = ['Bedroom', 'Kitchen', 'Seasonal', 'Discounted', 'Deals'];
    const names = {
        'Bedroom': ['Ziarat Oak Bed', 'Indus Nightstand', 'Kaghan Wardrobe', 'Hunza Dresser', 'Swat Armchair'],
        'Kitchen': ['Potohar Table', 'Margalla Stool', 'Bolan Cabinet', 'Salt Range Rack', 'Chenab Island'],
        'Seasonal': ['Murree Mantle', 'Naran Bench', 'Kalash Patio', 'Ayubia Rocker', 'Skardu Chest'],
        'Discounted': ['Lahore Heritage Desk', 'Ravi Side Table', 'Taxila Console', 'Sufi Prayer Seat', 'Khyber Shelf'],
        'Deals': ['Mehran Wall Mirror', 'Sialkot Shoe Rack', 'Multan Plant Stand', 'Quetta Rug Box', 'Gwadar Coffee Table']
    };

    // Initialize 25 Unique Products
    categories.forEach(cat => {
        names[cat].forEach((name, i) => {
            products.push({
                id: `${cat}-${i}`,
                category: cat,
                name: name,
                price: 32000 + (Math.random() * 85000),
                stock: Math.floor(Math.random() * 5) + 1,
                // Using high-quality furniture images with wood/glass focus
                img: `https://loremflickr.com/800/800/furniture,modern?random=${cat}${i}`,
                desc: `The ${name} represents the pinnacle of Silva-Vitrum design. Combining the warmth of seasoned Pakistani Sheesham wood with elegant artisan craftsmanship. This piece is built to endure generations.`,
                reviews: [{user: "Kamran Ali", stars: 5, text: "The quality from Silva-Vitrum is unmatched in Pakistan."}]
            });
        });
    });

    function render(list, target) {
        const grid = document.getElementById(target);
        grid.innerHTML = list.map(p => `
            <div class="product-card">
                <img src="${p.img}" onclick="viewProduct('${p.id}')" alt="${p.name}">
                <div class="product-name">${p.name}</div>
                <div class="product-price">Rs. ${Math.floor(p.price).toLocaleString()}</div>
                <div style="font-size:0.6rem; color:#888;">Live Stock: ${p.stock}</div>
            </div>
        `).join('');
    }

    function viewProduct(id) {
        const p = products.find(x => x.id === id);
        const detail = document.getElementById('product-detail-content');
        detail.innerHTML = `
            <img src="${p.img}" style="width:100%; border-radius:12px; box-shadow:0 10px 30px rgba(0,0,0,0.1);">
            <h1 style="font-family:'Playfair Display'; margin-top:20px;">${p.name}</h1>
            <div class="stars">★★★★★ (Certified Quality)</div>
            <div class="product-price" style="font-size:1.4rem;">Rs. ${Math.floor(p.price).toLocaleString()}</div>
            <p style="margin:20px 0; color:#444; font-size:0.95rem;">${p.desc}</p>
            <div style="display:flex; gap:12px;">
                <button class="btn-main" onclick="addToCart('${p.id}')">ADD TO CART</button>
                <button class="btn-alt" onclick="showUpsell()">ADD MORE ITEMS</button>
            </div>
            
            <div class="review-box">
                <h4 style="margin-top:0;">REVIEWS</h4>
                <div id="review-list-${p.id}">
                    ${p.reviews.map(r => `<div class="review-item"><strong>${r.user}</strong> ${'★'.repeat(r.stars)}<br>${r.text}</div>`).join('')}
                </div>
                <h5 style="margin-top:25px;">LEAVE A REVIEW</h5>
                <div id="star-input">
                    <span class="star-input" onclick="setStar(1)">★</span><span class="star-input" onclick="setStar(2)">★</span><span class="star-input" onclick="setStar(3)">★</span><span class="star-input" onclick="setStar(4)">★</span><span class="star-input" onclick="setStar(5)">★</span>
                </div>
                <textarea id="rev-text" placeholder="How was your experience with Silva-Vitrum?"></textarea>
                <button class="btn-alt" style="width:auto; padding:10px 30px;" onclick="postReview('${p.id}')">POST</button>
            </div>
        `;
        showPage('product-page');
    }

    let selectedStars = 0;
    function setStar(n) {
        selectedStars = n;
        const stars = document.querySelectorAll('.star-input');
        stars.forEach((s, i) => s.classList.toggle('selected', i < n));
    }

    function postReview(id) {
        const text = document.getElementById('rev-text').value;
        if(!selectedStars || !text) return alert("Please provide a rating and a comment.");
        const p = products.find(x => x.id === id);
        p.reviews.unshift({user: "Verified Client", stars: selectedStars, text: text});
        viewProduct(id);
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        cart.push(p);
        updateCartHeader();
        alert(p.name + " added to your Silva-Vitrum cart!");
    }

    function updateCartHeader() {
        const total = cart.reduce((sum, p) => sum + p.price, 0);
        document.getElementById('cart-status').innerText = `CART: ${cart.length} ITEMS | TOTAL: RS. ${Math.floor(total).toLocaleString()}`;
    }

    function showUpsell() {
        const randoms = products.sort(() => 0.5 - Math.random()).slice(0, 4);
        render(randoms, 'upsell-grid');
        showPage('add-more-page');
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('sidebar').classList.remove('active');
        if(id === 'checkout') {
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('final-summary').innerText = `SUMMARY: ${cart.length} Items Selected | Payable: Rs. ${Math.floor(total).toLocaleString()}`;
        }
        window.scrollTo(0,0);
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    function filter(c) { 
        const list = (c === 'All') ? products : products.filter(p => p.category === c);
        render(list, 'main-grid'); 
        showPage('home'); 
    }

    // Initial render
    render(products, 'main-grid');
</script>

</body>
</html>
