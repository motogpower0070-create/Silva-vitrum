<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silva-Vitrum | Premium Wood & Glass Suites</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@100;300;400;600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap');

        :root { --white: #ffffff; --black: #111111; --accent: #fcfcfc; --gold: #ae944f; --pkr-green: #006633; --sale-red: #bf1e2e; }
        body { font-family: 'Montserrat', sans-serif; margin: 0; background: var(--white); color: var(--black); line-height: 1.6; overflow-x: hidden; }

        /* Status & Cart (Fixed) */
        .cart-status-bar { background: var(--black); color: white; padding: 12px; text-align: center; position: sticky; top: 0; z-index: 1200; font-size: 0.7rem; letter-spacing: 2px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid #333; }
        
        header { background: rgba(255,255,255,0.98); padding: 1rem; text-align: center; border-bottom: 1px solid var(--accent); position: relative; z-index: 1000; }
        .logo { font-family: 'Playfair Display', serif; font-size: 2.2rem; letter-spacing: 3px; cursor: pointer; color: var(--black); font-weight: 700; }
        
        .ham { cursor: pointer; position: absolute; left: 20px; top: 25px; width: 25px; }
        .ham span { display: block; height: 1px; background: black; margin-bottom: 6px; }

        .sidebar { position: fixed; left: -100%; top: 0; width: 280px; height: 100%; background: white; z-index: 2000; transition: 0.5s; border-right: 1px solid #eee; padding-top: 80px; box-shadow: 10px 0 50px rgba(0,0,0,0.05); }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 18px 25px; text-decoration: none; color: black; font-size: 0.8rem; letter-spacing: 1px; border-bottom: 1px solid #f9f9f9; cursor: pointer; }
        .sidebar a:hover { color: var(--gold); }

        /* SPLASH / FRONT PAGE SECTION (Elegant Overlay) */
        #front-page-splash { position: fixed; top: 112px; left: 0; width: 100%; height: calc(100vh - 112px); background: white; z-index: 1500; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 40px 20px; box-sizing: border-box; transition: 0.8s ease; border-top: 1px solid #eee; }
        #front-page-splash.hide { opacity: 0; visibility: hidden; pointer-events: none; transform: translateY(20px); }
        
        .banner-title { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: #444; line-height: 1.6; text-align: center; margin-bottom: 40px; font-weight: 700; letter-spacing: 1px; max-width: 400px;}
        . banner-subtitle { font-size: 0.65rem; color: #777; letter-spacing: 3px; font-weight: 300; text-transform: uppercase; margin-bottom: 30px; }

        .banner-btn-container { position: absolute; top: 25%; width: 100%; text-align: center; cursor: pointer; padding: 20px 0; border-bottom: 1px solid #eee; border-top: 1px solid #eee;}
        .banner-btn { background: none; border: none; font-size: 0.8rem; font-family: 'Montserrat'; font-weight: 600; text-transform: uppercase; cursor: pointer; letter-spacing: 3px; }
        .banner-btn span { color: var(--gold); font-size: 1rem; position: relative; top: 3px;}

        /* Pages & Collections */
        .page { display: none; padding: 20px; min-height: 80vh; animation: fadeIn 0.4s; max-width: 900px; margin: auto; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .product-card { text-align: center; margin-bottom: 30px; position: relative; padding: 10px; border: 1px solid transparent; transition: 0.3s; }
        .product-card:hover { border-color: #eee; background: #fafafa; }
        .product-card img { width: 100%; height: 230px; object-fit: cover; border-radius: 4px; cursor: pointer; background: #eee; }
        
        /* Pricing & Details */
        .badge { position: absolute; top: 15px; left: 15px; background: var(--sale-red); color: white; padding: 5px 12px; font-size: 0.6rem; font-weight: 700; letter-spacing: 1px; border-radius: 2px; }
        .old-price { text-decoration: line-through; color: #999; font-size: 0.75rem; margin-right: 8px; }
        .current-price { color: var(--pkr-green); font-weight: 600; font-size: 0.85rem; }

        .product-name { font-size: 0.8rem; font-weight: 600; margin: 15px 0 5px; text-transform: uppercase; letter-spacing: 0.5px; }

        /* Interactive Controls */
        .buy-btn { background: black; color: white; border: none; padding: 15px; width: 100%; font-size: 0.7rem; font-weight: 600; cursor: pointer; text-transform: uppercase; margin-top: 10px; letter-spacing: 1.5px; }
        .q-btn { border: 1px solid #ddd; background: white; width: 28px; height: 28px; cursor: pointer; font-size: 1rem; }
        .qty-row { display: flex; justify-content: center; align-items: center; gap: 15px; margin: 10px 0; }

        input, select, textarea { width: 100%; padding: 15px; margin-top: 10px; border: 1px solid #eee; font-family: 'Montserrat'; font-size: 0.8rem; box-sizing: border-box; }
        .section-title { font-family: 'Playfair Display'; text-align: center; font-size: 1.8rem; margin-bottom: 30px; font-weight: 700; border-bottom: 2px solid #000; display: inline-block; }
        .back-nav-btn { background: none; border: none; text-decoration: underline; color: #666; font-size: 0.65rem; cursor: pointer; margin-bottom: 20px; font-weight: 600; }
    </style>
</head>
<body>

<div class="cart-status-bar" id="cart-status">
    CART: 0 ITEMS | RS. 0
</div>

<header>
    <div class="ham" onclick="toggleMenu()"><span></span><span></span><span></span></div>
    <div class="logo" onclick="showPage('home')">Silva-Vitrum</div>
</header>

<div class="sidebar" id="sidebar">
    <a onclick="filter('All')">ALL COLLECTIONS</a>
    <a onclick="filter('Bedroom')">BEDROOM SUITES</a>
    <a onclick="filter('Kitchen')">KITCHEN & DINING</a>
    <a onclick="filter('Seasonal')">SEASONAL EDITIONS</a>
    <a onclick="filter('Discounted')">DISCOUNTED PIECES</a>
    <a onclick="filter('Deals')">EXCLUSIVE BUNDLES</a>
    <a onclick="showPage('custom-order')" style="color: var(--gold);">BESPOKE REQUESTS</a>
    <a onclick="showPage('home')" style="background: #fafafa;">BACK TO SHOP</a>
</div>

<div id="front-page-splash">
    <div class="banner-btn-container" onclick="closeSplash()">
        <button class="banner-btn"><span>→</span> &nbsp; what are u waiting for?</button>
    </div>
    <div class="splash-middle">
        <img src="https://loremflickr.com/800/800/furniture,wood,artisan?random=splash" alt="Splash Image" style="max-height: 100%; width: auto; border-radius: 8px;">
    </div>
    <div class="banner-title">
        The Purest Fusion of Forest & Clarity<br>
        <div style="font-size:0.7rem; font-family:'Montserrat'; font-weight:300; letter-spacing:2px; margin-top:20px; color:#777">PAKISTAN’S ARTISAN COLLECTION</div>
    </div>
    
</div>

<div id="home" class="page active">
    <h2 class="section-title">The Pakistan Suite</h2>
    <div class="grid" id="main-grid"></div>
</div>

<div id="custom-order" class="page">
    <button class="back-nav-btn" onclick="showPage('home')">← Back to Shop</button>
    <h2 class="section-title">Bespoke Requests</h2>
    <input type="text" placeholder="Furniture Type">
    <textarea placeholder="Custom Dimensions & Requirements..." style="height: 100px;"></textarea>
    <button class="buy-btn" onclick="alert('Inquiry Sent!')">Submit Custom Request</button>
</div>

<div id="product-page" class="page">
    <button class="back-nav-btn" onclick="showPage('home')">← Back to Shop</button>
    <div id="product-detail-content"></div>
</div>

<div id="checkout" class="page">
    <button class="back-nav-btn" onclick="showPage('home')">← Back to Shop</button>
    <h2 class="section-title">Order Details</h2>
    <div id="final-summary" style="padding:15px; background:#fafafa; border:1px solid #eee; margin-bottom:20px;"></div>
    <input type="text" placeholder="Full Name">
    <input type="text" placeholder="WhatsApp Number (+92)">
    <select><option>Select City</option><option>Lahore</option><option>Karachi</option><option>Islamabad</option></select>
    <button class="buy-btn" onclick="alert('Order Successful!')">PLACE ORDER</button>
</div>

<script>
    let cart = [];
    let products = [];
    const cats = ['Bedroom', 'Kitchen', 'Seasonal', 'Discounted', 'Deals'];
    const names = {
        'Bedroom': ['Ziarat Bed', 'Indus Side', 'Kaghan Robe', 'Hunza Dress', 'Swat Chair'],
        'Kitchen': ['Pot Dining', 'Mar Stool', 'Bolan Cab', 'Salt Rack', 'Chen Island'],
        'Seasonal': ['Mur Mantle', 'Nar Bench', 'Kal Set', 'Ayu Chair', 'Ska Trunk'],
        'Discounted': ['Lah Desk', 'Ravi Table', 'Tax Console', 'Sufi Bench', 'Khy Shelf'],
        'Deals': ['Meh Mirror', 'Sial Rack', 'Mul Stand', 'Que Chest', 'Gwa Table']
    };

    // Gen 25 unique items
    cats.forEach(c => {
        names[c].forEach((name, i) => {
            products.push({
                id: `${c}-${i}`,
                category: c,
                name: name,
                price: 35000 + (Math.random() * 80000),
                stock: Math.floor(Math.random() * 5) + 1,
                img: `https://loremflickr.com/700/700/furniture,wood,glass?random=${c}${i}`,
                desc: `Exquisite ${name} artisan woodwork from Pakistan. Guaranteed solid Sheesham timber with bespoke glass fusion design.`
            });
        });
    });

    function render(list, target = 'main-grid') {
        const grid = document.getElementById(target);
        grid.innerHTML = list.map(p => `
            <div class="product-card">
                ${p.stock === 1 ? `<div class="badge">ONLY 1 LEFT</div>` : ''}
                <img src="${p.img}" onclick="viewProduct('${p.id}')">
                <div class="product-name">${p.name}</div>
                <div class="price">
                    <span class="current-price">Rs. ${Math.floor(p.price).toLocaleString()}</span>
                </div>
                <div style="font-size:0.5rem; color:#888;">Live Stock: ${p.stock}</div>
                <div class="qty-row">
                    <button class="q-btn" onclick="adjQty('${p.id}', -1)">-</button>
                    <span id="q-${target}-${p.id}">${cart.filter(item => item.id === p.id).length}</span>
                    <button class="q-btn" onclick="adjQty('${p.id}', 1)">+</button>
                </div>
                <button class="buy-btn" onclick="addToCart('${p.id}')">ADD TO CART</button>
            </div>
        `).join('');
    }

    function closeSplash() {
        document.getElementById('front-page-splash').classList.add('hide');
        window.scrollTo(0,0);
    }

    function viewProduct(id) {
        const p = products.find(x => x.id === id);
        const detail = document.getElementById('product-detail-content');
        detail.innerHTML = `
            <img src="${p.img}" style="width:100%; border-radius:8px;">
            <h2>${p.name}</h2>
            <div class="current-price" style="font-size:1.2rem; margin-bottom:10px;">Rs. ${p.price.toLocaleString()}</div>
            <p>${p.desc}</p>
            <button class="buy-btn" onclick="addToCart('${id}')">ADD TO CART</button>
        `;
        showPage('product-page');
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        if(cart.filter(item => item.id === id).length < p.stock) {
            cart.push(p);
            updateCartHeader();
            render(products); // Refresh counts in main grid
        } else {
            alert("No more items available in live stock.");
        }
    }

    function adjQty(id, delta) {
        if (delta === 1) {
            addToCart(id);
        } else {
            const index = cart.findIndex(item => item.id === id);
            if (index !== -1) cart.splice(index, 1);
            updateCartHeader();
            render(products);
        }
    }

    function updateCartHeader() {
        const total = cart.reduce((sum, p) => sum + p.price, 0);
        document.getElementById('cart-status').innerText = `CART: ${cart.length} ITEMS | TOTAL: RS. ${total.toLocaleString()}`;
    }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('sidebar').classList.remove('active');
        if(id === 'checkout') {
            const total = cart.reduce((sum, p) => sum + p.price, 0);
            document.getElementById('final-summary').innerText = `SUMMARY: ${cart.length} Items Selected | Payable: Rs. ${total.toLocaleString()}`;
        }
        closeSplash(); // Ensure splash closes if navigating from sidebar
        window.scrollTo(0,0);
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }
    function filter(c) { 
        const list = (c === 'All') ? products : products.filter(p => p.category === c);
        render(list); 
        showPage('home'); 
    }

    render(products);
</script>

</body>
</html>
