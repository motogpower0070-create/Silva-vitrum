<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silva Lignum | Artisan Woodwork</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cinzel:wght@400;700&display=swap');

        :root { 
            --gold: #D4AF37; /* True Metallic Gold */
            --bg: #0a0a0a; 
            --card-bg: #111;
        }
        
        body { 
            font-family: 'Cinzel', serif; 
            margin: 0; 
            background-color: var(--bg);
            background-image: radial-gradient(circle at 2px 2px, #1a1a1a 1px, transparent 0);
            background-size: 30px 30px;
            color: var(--gold); 
            overflow-x: hidden;
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.8s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        header { 
            background: rgba(0,0,0,0.95); 
            padding: 1.5rem; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 100; 
            border-bottom: 1px solid var(--gold); 
        }

        /* Hamburger Menu (Top Left) */
        .menu-btn { 
            position: absolute; left: 20px; top: 25px; 
            cursor: pointer; background: none; border: none; 
            display: flex; flex-direction: column; gap: 5px;
        }
        .menu-btn span { width: 25px; height: 2px; background: var(--gold); transition: 0.3s; }

        .logo { font-family: 'Great Vibes', cursive; font-size: 2.2rem; margin: 0; color: var(--gold); }

        /* Sidebar */
        .sidebar { 
            position: fixed; left: -300px; top: 0; width: 260px; height: 100%; 
            background: #000; z-index: 1000; transition: 0.4s; padding-top: 60px;
            border-right: 1px solid var(--gold);
        }
        .sidebar.active { left: 0; }
        .sidebar a { display: block; padding: 15px 25px; color: var(--gold); text-decoration: none; font-size: 1rem; border-bottom: 1px solid #222; }
        .sidebar a:hover { background: var(--gold); color: #000; }

        /* Sections */
        .content-section { display: none; padding: 20px; max-width: 1200px; margin: auto; }
        .content-section.active { display: block; }

        /* 2-Column Grid */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { background: var(--card-bg); border: 1px solid #222; overflow: hidden; position: relative; }
        .card img { width: 100%; height: 200px; object-fit: cover; filter: brightness(0.7); transition: 0.5s; }
        .card:hover img { filter: brightness(1); transform: scale(1.05); }
        .info { padding: 10px; text-align: center; }
        .info h3 { font-size: 0.8rem; margin: 5px 0; text-transform: uppercase; }
        .price { font-weight: bold; font-size: 0.9rem; }

        /* About Text */
        .about-text { font-family: 'Great Vibes', cursive; font-size: 1.8rem; text-align: center; line-height: 1.6; padding: 40px 20px; }

        /* Modal */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); display: none; z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: #000; width: 100%; max-width: 400px; border: 1px solid var(--gold); padding: 20px; text-align: center; }
        .wa-btn { background: var(--gold); color: #000; padding: 12px; display: block; text-decoration: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<header>
    <button class="menu-btn" onclick="toggleMenu()"><span></span><span></span><span></span></button>
    <h1 class="logo">Silva Lignum</h1>
</header>

<div class="sidebar" id="sidebar">
    <a onclick="showPage('shop')">Shop All</a>
    <a onclick="showPage('about')">Our Story</a>
    <hr style="border: 0.5px solid #222;">
    <a onclick="filter('Bedroom')">Bedrooms</a>
    <a onclick="filter('Kitchen')">Kitchens</a>
    <a onclick="filter('Deals')">Exclusive Deals</a>
    <a onclick="filter('Discounted')">Clearance</a>
    <a onclick="filter('Seasonal')">Seasonal</a>
</div>

<div id="about" class="content-section fade-in">
    <div class="about-text">
        "Every piece of timber holds a soul. At Silva Lignum, we don't just build furniture; we preserve the legacy of the forest in a dance of shadow and gold."
    </div>
</div>

<div id="shop" class="content-section active fade-in">
    <h2 id="view-title" style="text-align:center; text-transform:uppercase; letter-spacing:3px;">The Gallery</h2>
    <div class="grid" id="product-grid"></div>
</div>

<div class="modal" id="modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <img id="m-img" src="" style="width:100%;">
        <h2 id="m-name" style="font-family:'Great Vibes'; font-size: 2rem;"></h2>
        <p id="m-price"></p>
        <a id="m-wa" href="" class="wa-btn" target="_blank">INQUIRE (PKR)</a>
    </div>
</div>

<script>
    const demoWA = "920000000000";

    // Generating 10 products per category (50 total)
    const categories = ["Bedroom", "Kitchen", "Deals", "Discounted", "Seasonal"];
    const products = [];

    categories.forEach(cat => {
        for(let i=1; i<=10; i++) {
            products.push({
                category: cat,
                name: `${cat} Piece No. ${i}`,
                price: `Rs. ${Math.floor(Math.random() * 500000) + 20000}`,
                img: `https://picsum.photos/400/400?random=${cat}${i}` // Random furniture-style placeholders
            });
        }
    });

    function renderProducts(list = products) {
        const grid = document.getElementById('product-grid');
        grid.innerHTML = '';
        list.forEach(p => {
            const card = document.createElement('div');
            card.className = 'card';
            card.onclick = () => openModal(p);
            card.innerHTML = `<img src="${p.img}"><div class="info"><h3>${p.name}</h3><p class="price">${p.price}</p></div>`;
            grid.appendChild(card);
        });
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

    function showPage(pageId) {
        document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        toggleMenu();
    }

    function filter(cat) {
        showPage('shop');
        document.getElementById('view-title').innerText = cat;
        const filtered = products.filter(p => p.category === cat);
        renderProducts(filtered);
    }

    function openModal(p) {
        document.getElementById('m-img').src = p.img;
        document.getElementById('m-name').innerText = p.name;
        document.getElementById('m-price').innerText = p.price;
        document.getElementById('m-wa').href = `https://wa.me/${demoWA}?text=Inquiry: ${p.name}`;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    renderProducts();
</script>
</body>
</html>
