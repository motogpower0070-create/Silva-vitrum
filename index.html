<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silva-Vitrum | Premium Suites</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@200;400;600&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root { 
            --white: #ffffff; 
            --black: #000000; 
            --soft-grey: #fcfcfc;
            --border: #f0f0f0;
            --pkr-green: #1a4a36; 
            --sale-red: #9e1b1b; 
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            margin: 0; 
            background: var(--white); 
            color: var(--black); 
            overflow-x: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* Navigation & Header */
        .cart-status { 
            background: var(--black); 
            color: white; 
            padding: 10px; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 5000; 
            font-size: 0.65rem; 
            letter-spacing: 3px; 
            text-transform: uppercase; 
            font-weight: 200;
        }

        header { 
            background: white; 
            padding: 2rem 1rem; 
            text-align: center; 
            border-bottom: 1px solid var(--border); 
            position: relative; 
            z-index: 4000; 
        }

        .logo { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.2rem; 
            letter-spacing: 4px; 
            font-weight: 400; 
            cursor: pointer; 
        }
        
        .ham { 
            cursor: pointer; 
            position: absolute; 
            left: 30px; 
            top: 50%; 
            transform: translateY(-50%); 
            width: 22px; 
            height: 14px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            z-index: 5500; 
        }
        .ham span { display: block; height: 1px; width: 100%; background: black; transition: 0.4s; }
        
        .sidebar { 
            position: fixed; 
            left: -100%; 
            top: 0; 
            width: 100%; 
            height: 100%; 
            background: white; 
            z-index: 5200; 
            transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .sidebar.active { left: 0; }
        .sidebar a { 
            display: block; 
            padding: 15px; 
            text-decoration: none; 
            color: black; 
            font-size: 1.2rem; 
            font-family: 'Playfair Display';
            cursor: pointer; 
            letter-spacing: 2px;
        }

        /* Splash Page */
        #splash { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100vh; 
            background: var(--white); 
            z-index: 9000; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            transition: 1s ease; 
        }
        #splash.hide { opacity: 0; visibility: hidden; }
        .cta-btn { 
            background: none; 
            border: none; 
            font-size: 0.8rem; 
            font-weight: 400; 
            text-transform: uppercase; 
            letter-spacing: 6px; 
            cursor: pointer; 
            padding-bottom: 10px;
            border-bottom: 1px solid black;
        }

        /* Grid & Cards */
        .page { display: none; padding: 40px 20px; max-width: 1200px; margin: auto; animation: fadeIn 0.8s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { 
            text-align: left; 
            cursor: pointer; 
            transition: 0.4s;
            border-bottom: 1px solid transparent;
            padding-bottom: 10px;
        }
        .card:hover { border-bottom: 1px solid var(--black); }
        
        .product-name-heading { 
            font-size: 0.7rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            margin: 15px 0 5px 0;
            color: var(--black); 
        }
        .price-tag { font-size: 0.8rem; font-weight: 400; color: #555; }
        .old-price { color: #aaa; text-decoration: line-through; font-size: 0.7rem; margin-right: 8px; }

        /* Premium Modal Pop-up */
        #premium-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            z-index: 9999;
            display: none;
            align-items: center;
            justify-content: center;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            max-width: 400px;
            padding: 40px;
            animation: modalSlide 0.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        @keyframes modalSlide { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        
        .modal-title { font-family: 'Playfair Display'; font-size: 2.2rem; margin-bottom: 15px; font-weight: 400; }
        .modal-text { font-size: 0.7rem; letter-spacing: 2px; color: #888; margin-bottom: 40px; text-transform: uppercase; line-height: 1.6; }

        /* Buttons */
        .back-nav { display: inline-block; margin-bottom: 30px; font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; color: #000; cursor: pointer; border: none; background: none; padding: 0; }
        .primary-btn { background: var(--black); color: white; border: none; padding: 22px; width: 100%; font-size: 0.7rem; letter-spacing: 3px; text-transform: uppercase; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .secondary-btn { background: transparent; color: black; border: 1px solid black; padding: 20px; width: 100%; font-size: 0.7rem; text-transform: uppercase; cursor: pointer; margin-top: 10px; letter-spacing: 2px; }
        .clear-btn { color: var(--sale-red); background: none; border: none; font-size: 0.6rem; letter-spacing: 1px; cursor: pointer; text-decoration: underline; }
        
        input, select { width: 100%; padding: 20px 0; margin-bottom: 10px; border: none; border-bottom: 1px solid #ddd; font-family: 'Montserrat'; font-size: 0.8rem; outline: none; background: transparent; }
        .sec-title { font-family: 'Playfair Display'; text-align: center; font-size: 2rem; margin-bottom: 50px; font-weight: 400; }
    </style>
</head>
<body>

<div id="premium-modal">
    <div class="modal-content">
        <div class="modal-title" id="m-title">Confirmed</div>
        <div class="modal-text" id="m-text">The item has been added to your collection.</div>
        <button class="primary-btn" onclick="closeModal()">CONTINUE BROWSING</button>
    </div>
</div>

<div id="splash">
    <button class="cta-btn" onclick="closeSplash()">Enter Silva-Vitrum</button>
</div>

<div class="cart-status" id="cart-text">BAG: 0 ITEMS | RS. 0</div>

<header>
    <div class="ham" onclick="toggleMenu()">
        <span></span><span></span><span></span>
    </div>
    <div class="logo" onclick="showPage('home')">Silva-Vitrum</div>
</header>

<div class="sidebar" id="sidebar">
    <a onclick="filterItems('All')">The Collection</a>
    <a onclick="filterItems('Bedroom')">Bedroom</a>
    <a onclick="filterItems('Kitchen')">Kitchen</a>
    <a onclick="filterItems('Seasonal')">Seasonal</a>
    <a onclick="filterItems('Discounted')">Private Sale</a>
    <a onclick="showPage('checkout')">Checkout</a>
</div>

<div id="home" class="page active">
    <h2 class="sec-title">Selected Works</h2>
    <div class="grid" id="main-grid"></div>
</div>

<div id="details" class="page">
    <button class="back-nav" onclick="showPage('home')">← RETURN TO SHOP</button>
    <div id="detail-content"></div>
</div>

<div id="suggestions" class="page">
    <button class="back-nav" onclick="showPage('home')">← RETURN TO SHOP</button>
    <h2 class="sec-title">The Ensemble</h2>
    <p style="text-align:center; font-size:0.7rem; margin-bottom:40px; letter-spacing:1px; color:#888;">MATCHING PIECES FOR YOUR INTERIOR</p>
    <div class="grid" id="suggest-grid"></div>
    <div style="margin-top:40px;">
        <button class="primary-btn" onclick="showPage('checkout')">CHECKOUT NOW</button>
        <button class="secondary-btn" onclick="showPage('home')">ADD MORE PIECES</button>
    </div>
</div>

<div id="checkout" class="page">
    <button class="back-nav" onclick="showPage('home')">← RETURN TO SHOP</button>
    <h2 class="sec-title">Order Request</h2>
    <div id="final-summary" style="padding:20px 0; border-top:1px solid #eee; margin-bottom:20px; font-size:0.75rem; line-height:1.8;"></div>
    
    <div style="text-align:right;">
        <button class="clear-btn" onclick="clearCart()">Empty Cart</button>
    </div>

    <input type="text" placeholder="FULL NAME">
    <input type="text" placeholder="SHIPPING ADDRESS">
    <input type="tel" placeholder="WHATSAPP NUMBER">
    <input type="email" placeholder="EMAIL (OPTIONAL)">
    <select>
        <option disabled selected>PAYMENT METHOD</option>
        <option>Bank Transfer</option>
        <option>Digital Wallet (EasyPaisa/JazzCash)</option>
        <option>Cash on Delivery</option>
    </select>
    <button class="primary-btn" onclick="triggerOrder()">SEND ORDER INQUIRY</button>
</div>

<script>
    let cart = [];
    const products = [
        { id: 1, cat: 'Bedroom', name: 'Royal Haven Suite', price: 180000 },
        { id: 2, cat: 'Bedroom', name: 'Midnight Luxe Collection', price: 210000 },
        { id: 3, cat: 'Bedroom', name: 'Serene Oak Retreat', price: 165000 },
        { id: 4, cat: 'Kitchen', name: 'Golden Crest Suite', price: 120000 },
        { id: 5, cat: 'Kitchen', name: 'Urban Noir Collection', price: 145000 },
        { id: 6, cat: 'Kitchen', name: 'Pure Haven Set', price: 110000 },
        { id: 10, cat: 'Discounted', name: 'Bargain Haven', price: 70000, sale: true },
        { id: 11, cat: 'Discounted', name: 'Deal Depot Piece', price: 56000, sale: true },
        { id: 13, cat: 'Deals', name: 'Perfect Pair Deal', price: 250000 }
    ];

    // THE FIX: Fully custom modal logic
    function openModal(title, text, reload = false) {
        document.getElementById('m-title').innerText = title;
        document.getElementById('m-text').innerText = text;
        document.getElementById('premium-modal').style.display = 'flex';
        window.modalReload = reload;
    }

    function closeModal() {
        document.getElementById('premium-modal').style.display = 'none';
        if(window.modalReload) location.reload();
    }

    // THE FIX: Custom order trigger
    function triggerOrder() {
        openModal("Request Sent", "Your inquiry has been received. Our concierge team will reach out via WhatsApp to finalize the details.", true);
    }

    function renderProducts(list = products) {
        document.getElementById('main-grid').innerHTML = list.map(p => {
            let priceHtml = `RS. ${p.price.toLocaleString()}`;
            if(p.sale) {
                const old = Math.round(p.price / 0.7);
                priceHtml = `<span class="old-price">RS. ${old.toLocaleString()}</span> RS. ${p.price.toLocaleString()}`;
            }
            return `
            <div class="card" onclick="openDetails(${p.id})">
                <div style="background:#f9f9f9; height:150px; width:100%; border-radius:2px;"></div>
                <div class="product-name-heading">${p.name}</div>
                <div class="price-tag">${priceHtml}</div>
            </div>`;
        }).join('');
    }

    function openDetails(id) {
        const p = products.find(x => x.id === id);
        document.getElementById('detail-content').innerHTML = `
            <div style="background:#fafafa; padding:80px 20px; text-align:center; margin-bottom:40px;">
                <h1 style="font-family:'Playfair Display'; font-weight:400; font-style:italic;">${p.name}</h1>
            </div>
            <p style="font-size:0.6rem; letter-spacing:2px; color:#888; margin-bottom:10px;">OBJECT NO. ${p.id}00${p.id}</p>
            <h2 style="font-family:'Playfair Display'; font-size:1.8rem; margin:0 0 10px 0; font-weight:400;">${p.name}</h2>
            <div class="price-tag" style="font-size:1rem; color:black;">RS. ${p.price.toLocaleString()}</div>
            <p style="font-size:0.8rem; color:#666; line-height:1.8; margin:30px 0;">Hand-finished in Gujrat using premium artisan techniques.</p>
            <button class="primary-btn" onclick="addToCart(${p.id})">ADD TO COLLECTION</button>
        `;
        showPage('details');
    }

    function addToCart(id) {
        const p = products.find(x => x.id === id);
        cart.push(p);
        updateCartUI();
        
        const related = products.filter(x => x.cat === p.cat && x.id !== p.id).slice(0, 4);
        document.getElementById('suggest-grid').innerHTML = related.map(s => `
            <div class="card">
                <div style="background:#f9f9f9; height:100px; width:100%;"></div>
                <div style="font-size:0.6rem; font-weight:600; text-transform:uppercase; margin:10px 0 5px 0;">${s.name}</div>
                <div class="price-tag" style="font-size:0.7rem; margin-bottom:15px;">RS. ${s.price.toLocaleString()}</div>
                <button class="secondary-btn" style="padding:12px; font-size:0.55rem;" onclick="silentAdd(${s.id})">+ ADD TO ENSEMBLE</button>
            </div>`).join('');
        
        showPage('suggestions');
    }

    // THE FIX: Replaced old button-green-logic with the Premium Modal
    function silentAdd(id) {
        const p = products.find(x => x.id === id);
        cart.push(p);
        updateCartUI();
        openModal("Piece Added", "This artisan item has been added to your ensemble successfully.");
    }

    function clearCart() {
        if(confirm("Empty bag?")) {
            cart = [];
            updateCartUI();
            showPage('home');
        }
    }

    function updateCartUI() {
        const total = cart.reduce((sum, p) => sum + p.price, 0);
        document.getElementById('cart-text').innerText = `BAG: ${cart.length} ITEMS | TOTAL: RS. ${total.toLocaleString()}`;
        document.getElementById('final-summary').innerHTML = `<strong>Items:</strong> ${cart.length} pieces <br> <strong>Total Value:</strong> Rs. ${total.toLocaleString()}`;
    }

    function toggleMenu() { document.getElementById('sidebar').classList.toggle('active'); }

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('sidebar').classList.remove('active');
        window.scrollTo(0,0);
    }

    function filterItems(cat) {
        if(cat === 'All') renderProducts(products);
        else renderProducts(products.filter(p => p.cat === cat));
        showPage('home');
    }

    function closeSplash() { document.getElementById('splash').classList.add('hide'); }

    renderProducts();
</script>
</body>
</html>
